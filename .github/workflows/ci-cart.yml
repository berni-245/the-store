name: CI - cart

# Caso 1/2: opening or updating a PR against main builds the image and runs
# unit tests. Nothing is pushed. A failure blocks the merge (branch protection).
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/cart/**'
      - 'charts/cart/**'
      - '.github/workflows/ci-cart.yml'

jobs:
  build-test:
    name: Build & test cart
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Retry failed downloads and raise the HTTP read timeout (10 min) so a
      # slow/flaky runner connection doesn't abort fetching Maven dependencies.
      # Passed via MAVEN_OPTS (JVM -D) so the Windows/PowerShell runner doesn't
      # split the -D arguments on the command line.
      - name: Run unit tests
        working-directory: src/cart
        env:
          MAVEN_OPTS: -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.rto=600000
        run: ./mvnw test

      - name: Build Docker image (no push)
        run: docker build -t the-store-cart:ci src/cart
