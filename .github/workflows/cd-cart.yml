name: CD - cart

# Caso 3/4: a merge to main builds a SHA-tagged image, pushes it to GHCR,
# deploys it with Helm to the local Kind cluster, verifies the rollout, and
# rolls back automatically if the rollout fails.
on:
  push:
    branches: [main]
    paths:
      - 'src/cart/**'
      - 'charts/cart/**'
      - '.github/workflows/cd-cart.yml'

permissions:
  contents: read
  packages: write          # required to push to GHCR with GITHUB_TOKEN

# The self-hosted runner is Windows, where run: steps default to PowerShell.
# Force bash (Git Bash, shipped with Git for Windows) so the bash parameter
# expansion (${OWNER,,}), $GITHUB_ENV redirection and $IMAGE/$SERVICE refs work.
defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy cart
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      SERVICE: cart
      NAMESPACE: the-store
    steps:
      # On the Windows runner `shell: bash` otherwise resolves to WSL's bash
      # (C:\Windows\System32\bash.exe), which has no distro installed and fails.
      # Prepend Git Bash so the bash steps below use it. Skipped on Linux.
      - name: Prefer Git Bash over WSL (Windows runner)
        if: runner.os == 'Windows'
        shell: powershell
        run: Add-Content -Path $env:GITHUB_PATH -Value (Join-Path (Split-Path -Parent (Split-Path -Parent (Get-Command git).Source)) 'bin')

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve GHCR image (must be lowercase)
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE=ghcr.io/${OWNER,,}/the-store-${SERVICE}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image tagged with the commit SHA
        run: docker build -t "$IMAGE:${{ github.sha }}" "src/$SERVICE"

      - name: Push image to GHCR
        run: docker push "$IMAGE:${{ github.sha }}"

      - name: Deploy with Helm
        run: |
          helm upgrade --install "$SERVICE" "charts/$SERVICE" \
            --namespace "$NAMESPACE" --create-namespace \
            --set image.repository="$IMAGE" \
            --set image.tag="${{ github.sha }}"

      - name: Verify rollout
        run: kubectl rollout status "deployment/$SERVICE" -n "$NAMESPACE" --timeout=120s

      - name: Roll back on failed rollout
        if: failure()
        run: |
          echo "Rollout failed - rolling back $SERVICE to the previous release"
          helm rollback "$SERVICE" -n "$NAMESPACE" || echo "No previous release to roll back to"
          exit 1
