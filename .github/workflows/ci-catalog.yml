name: CI - catalog

# Caso 1/2: a PR to main builds the image and runs unit tests. Nothing is pushed.
# A failure blocks the merge (branch protection).
#
# Path filtering is done by the first step (`filter`) plus an `if:` on every later
# step — NOT by the workflow trigger (`on.pull_request.paths`). Reason: this is a
# REQUIRED status check, and a workflow skipped by a trigger-level path filter
# never creates its check run, leaving the required check "pending" forever and
# blocking merges on PRs that don't touch catalog. Here the job always runs and
# reports `Build & test catalog`; when catalog is unchanged every real step is
# skipped, so the check passes instantly without building anything.
on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test catalog
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      # Reads the PR's changed-file list via the API, so it needs no checkout.
      - name: Detect catalog changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'src/catalog/**'
              - 'charts/catalog/**'
              - '.github/workflows/ci-catalog.yml'

      - name: Checkout code
        if: steps.filter.outputs.catalog == 'true'
        uses: actions/checkout@v4

      - name: Set up Go
        if: steps.filter.outputs.catalog == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: src/catalog/go.mod

      # No network-timeout flag like yarn/maven here: the Go toolchain fetches
      # modules through GOPROXY (proxy.golang.org) with built-in retries, so it
      # is already resilient to a slow/flaky runner connection.
      - name: Run unit tests
        if: steps.filter.outputs.catalog == 'true'
        working-directory: src/catalog
        run: go test ./...

      - name: Build Docker image (no push)
        if: steps.filter.outputs.catalog == 'true'
        run: docker build -t the-store-catalog:ci src/catalog
