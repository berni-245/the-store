# Default values for the checkout chart.
# CD overrides image.repository (GHCR) and image.tag (commit SHA) at deploy time.
# Local defaults point at the image built by local.sh and loaded into Kind.
image:
  repository: the-store-checkout
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 128m
    memory: 256Mi
